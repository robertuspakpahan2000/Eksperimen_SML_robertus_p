name: Automated Preprocessing Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'heart_raw.csv'
      - 'preprocessing/automate_robertus_p.py'
  workflow_dispatch:  # Manual trigger

jobs:
  preprocessing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.7'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_robertus_p.py \
            --input heart_raw.csv \
            --output preprocessing/heart_preprocessing

      - name: Verify Output Files
        run: |
          echo "=== Preprocessed files ==="
          ls -lh preprocessing/heart_preprocessing/
          echo "=== Preview heart_preprocessing.csv ==="
          head -5 preprocessing/heart_preprocessing/heart_preprocessing.csv

      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add preprocessing/heart_preprocessing/
          git diff --staged --quiet || git commit -m "ci: auto preprocessing - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
